<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GomokuVN — Phòng chơi</title>
  <meta name="description" content="GomokuVN — Phòng chơi Caro trực tuyến." />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/room.css" />
</head>
<body>

<div id="status-banner" class="status-banner" aria-live="polite"></div>

<nav class="topnav">
  <a href="index.html" class="topnav__brand">
    <svg width="24" height="24" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="36" height="36" rx="4" fill="rgba(255,255,255,0.12)"/>
      <line x1="12" y1="6" x2="12" y2="30" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
      <line x1="24" y1="6" x2="24" y2="30" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
      <line x1="6" y1="12" x2="30" y2="12" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
      <line x1="6" y1="24" x2="30" y2="24" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
      <line x1="9" y1="9" x2="15" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="9" x2="9" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="24" cy="24" r="4" fill="white"/>
    </svg>
    <span class="topnav__title">GomokuVN</span>
  </a>
  <div class="topnav__right">
    <span id="room-id-display" class="topnav__user" style="font-family:monospace;font-weight:700;"></span>
    <button id="btn-leave" class="topnav__btn" type="button">Rời phòng</button>
  </div>
</nav>

<main style="max-width:880px;margin:0 auto;padding:32px 20px;">
  <p style="color:var(--c-ink-2);font-size:14px;">Phòng chơi — đang xây dựng (Phase 3)</p>
  <pre id="room-data" style="margin-top:16px;padding:16px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-lg);font-size:12px;overflow:auto;max-height:400px;"></pre>
</main>

<script src="/socket.io/socket.io.js"></script>
<script src="js/socket-client.js"></script>
<script>
  // Display room data stored by lobby.js
  const raw = sessionStorage.getItem('gvn_room');
  if (raw) {
    const data = JSON.parse(raw);
    document.getElementById('room-id-display').textContent = data.roomId || '';
    document.getElementById('room-data').textContent = JSON.stringify(data, null, 2);
  } else {
    document.getElementById('room-data').textContent = 'Không có dữ liệu phòng.';
  }

  document.getElementById('btn-leave').addEventListener('click', () => {
    sessionStorage.removeItem('gvn_room');
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
