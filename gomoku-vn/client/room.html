<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GomokuVN — Phòng chơi</title>
  <meta name="description" content="GomokuVN — Phòng chơi Caro trực tuyến với luật Wall và Portal." />
  <link rel="stylesheet" href="css/main.css?v=5" />
  <link rel="stylesheet" href="css/lobby.css?v=5" />
  <link rel="stylesheet" href="css/room.css?v=5" />
  <link rel="stylesheet" href="css/game.css?v=5" />
</head>
<body>

<!-- ── Connection Status ───────────────────────────────────────────────── -->
<div id="status-banner" class="status-banner" aria-live="polite"></div>

<!-- ── Top Nav ──────────────────────────────────────────────────────────── -->
<nav class="topnav" role="navigation">
  <a href="index.html" class="topnav__brand">
    <svg width="24" height="24" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="36" height="36" rx="4" fill="rgba(255,255,255,0.12)"/>
      <line x1="12" y1="6" x2="12" y2="30" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
      <line x1="24" y1="6" x2="24" y2="30" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
      <line x1="6" y1="12" x2="30" y2="12" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
      <line x1="6" y1="24" x2="30" y2="24" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
      <line x1="9" y1="9" x2="15" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="15" y1="9" x2="9" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="24" cy="24" r="4" fill="white"/>
    </svg>
    <span class="topnav__title">GomokuVN</span>
  </a>
  <div class="topnav__right">
    <span id="room-id-nav" class="topnav__user" style="font-family:'SF Mono','Consolas',monospace;font-weight:700;"></span>
    <button id="btn-leave" class="topnav__btn" type="button">Rời phòng</button>
  </div>
</nav>

<!-- ── Room Content ────────────────────────────────────────────────────── -->
<main class="room" role="main">

  <!-- ─ Left Sidebar: Player Slots ───────────────────────────────────── -->
  <aside class="sidebar-left">

    <!-- Slot 1 -->
    <div id="slot-1" class="slot-card">
      <div class="slot-card__label">
        #1
      </div>
      <div id="slot-1-content"></div>
    </div>

    <!-- Slot 2 -->
    <div id="slot-2" class="slot-card">
      <div class="slot-card__label">
        #2
      </div>
      <div id="slot-2-content"></div>
    </div>

    <!-- Action buttons -->
    <div id="action-buttons" class="slot-actions"></div>

    <!-- Score table -->
    <div class="score-panel" id="score-panel" style="display:none;">
      <div class="score-panel__title">Bảng điểm</div>
      <table class="score-table">
        <thead>
          <tr><th>Tên</th><th>T</th><th>B</th><th>H</th></tr>
        </thead>
        <tbody id="score-body"></tbody>
      </table>
    </div>
  </aside>

  <!-- ─ Center: Board Area ───────────────────────────────────────────── -->
  <section class="board-area" id="board-area">
    <div class="board-placeholder">
      <div class="board-placeholder__icon">♟</div>
      <div class="board-placeholder__text">Chờ người chơi ngồi vào và sẵn sàng...</div>
    </div>
  </section>

  <!-- ─ Right Sidebar: Tabs ───────────────────────── -->
  <aside class="sidebar-right">
    <div class="sidebar-tabs">
      <button class="tab-btn tab-btn--active" data-tab="tab-chat">Trò chuyện</button>
      <button class="tab-btn" data-tab="tab-users">Khán giả</button>
      <button class="tab-btn" data-tab="tab-settings">Cài đặt</button>
    </div>

    <div class="tab-content tab-content--active" id="tab-chat">
      <div class="chat-panel">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input" id="chat-input-wrapper">
          <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." maxlength="500" autocomplete="off" />
          <button id="btn-send" type="button">Gửi</button>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-users">
      <div id="users-panel" class="users-panel">
        <ul id="users-list" class="users-list"></ul>
      </div>
    </div>

    <div class="tab-content" id="tab-settings">
      <div id="settings-panel" class="settings-panel">
        <div class="settings-panel__body open" id="settings-body"></div>
      </div>
    </div>
  </aside>
</main>

<!-- Game End Overlay -->
<div class="game-overlay" id="game-overlay">
  <div class="game-overlay__card">
    <div class="game-overlay__result" id="overlay-result"></div>
    <div class="game-overlay__reason" id="overlay-reason"></div>
    <div class="game-overlay__actions">
      <button class="btn-overlay btn-overlay--primary" id="btn-rematch" type="button">Đấu lại</button>
      <button class="btn-overlay btn-overlay--secondary" id="btn-close-overlay" type="button">Đóng</button>
    </div>
  </div>
</div>

<!-- Float Messages (appear on top of game board) -->
<div id="float-messages" class="float-messages"></div>

<!-- Focus Mode Toggle (only visible during game) -->
<button id="btn-focus" class="btn-focus" type="button" title="Chế độ tập trung" style="display:none;">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
  </svg>
</button>

<!-- Socket.io CDN -->
<script src="/socket.io/socket.io.js"></script>
<script src="js/socket-client.js?v=5"></script>
<script src="js/board.js?v=5"></script>
<script src="js/room.js?v=5"></script>
</body>
</html>
